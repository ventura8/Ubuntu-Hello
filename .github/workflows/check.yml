name: Build & Check

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install required libraries
        run: >
          sudo apt-get update && sudo apt-get install -y
          python3 python3-pip python3-dev python3-setuptools python3-wheel
          python3-numpy python3-opencv python3-gi python3-gi-cairo gir1.2-gtk-3.0
          cmake make build-essential clang-tidy g++
          libpam0g-dev libinih-dev libevdev-dev libboost-all-dev
          pkg-config libopencv-dev
          meson ninja-build

      - name: Install test dependencies
        run: |
          pip3 install pytest pytest-cov keyboard --break-system-packages

      - name: Build
        run: |
          meson setup build
          ninja -C build

      - name: Check source code
        run: |
          ninja clang-tidy -C build

      - name: Lint Python files
        run: |
          python3 -c "import sys, py_compile, glob; [py_compile.compile(f, doraise=True) for f in glob.glob('**/*.py', recursive=True) if not any(p in f for p in ['.git', '.pytest_cache', 'build', 'builddir'])]"

      - name: Run Python unit tests
        run: |
          pytest --cov=ubuntu-hello-gtk --cov=ubuntu-hello --cov-fail-under=90 tests/

  # Verify debian packaging builds successfully
  deb-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential debhelper meson ninja-build \
            python3 python3-dev \
            pkg-config libpam0g-dev libinih-dev libevdev-dev \
            libboost-all-dev cmake g++

      - name: Build debian package
        run: |
          dpkg-buildpackage -b -us -uc
          echo "✔ Package built successfully"
          ls -la ../*.deb
